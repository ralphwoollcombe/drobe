{% extends 'base.html' %} 
{% load static %}
{% block head %}
<link rel="stylesheet" href="{% static 'css/form.css' %}" />
{% endblock %}
{% block content %}

<section class="page-header">
  <div class="title-card">
    <h1>Delete Garment</h1>
  </div>
</section>

<section class="form-wrapper delete-wrapper">
  <div class="delete-content">
    <h2 class="delete-warning">Are you sure you want to delete</h2>
    <span class="delete-name">{{ garment.name }}?</span>
    <p class="delete-message">This action cannot be undone. This garment will be permanently removed from your Drobe.</p>
  </div>

  <form action="" method="post" class="delete-actions">
    {% csrf_token %}
    <a href="{% url 'garment-detail' garment.id %}" class="btn btn-sage">Cancel</a>
    <button type="submit" class="btn btn-danger">Yes — Delete!</button>
  </form>
</section>

{% endblock %}
